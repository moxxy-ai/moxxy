<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moxxy</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <style>
      html, body { margin: 0; background: #08080c; color: #e8e8f2;
        font-family: 'Inter', -apple-system, system-ui, sans-serif; }
      #splash-fallback { position: fixed; inset: 0; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 1.25rem; }
      #splash-fallback .mark { width: 56px; height: 56px; border-radius: 6px;
        background: linear-gradient(135deg, #818cf8, #22d3ee);
        display: flex; align-items: center; justify-content: center;
        font-family: 'JetBrains Mono', monospace; font-weight: 700;
        font-size: 1.5rem; color: #08080c;
        box-shadow: 0 0 36px rgba(129,140,248,0.35); }
      #splash-fallback .spin { width: 18px; height: 18px; border-radius: 50%;
        border: 2px solid #20202c; border-top-color: #818cf8;
        animation: splash-spin 0.8s linear infinite; }
      #splash-fallback .label { font-size: 0.78rem; color: #686d86;
        letter-spacing: 0.04em; font-family: 'JetBrains Mono', monospace; }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
    <div id="root">
      <div id="splash-fallback">
        <div class="mark">m</div>
        <div class="spin"></div>
        <div class="label">Starting moxxy…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
