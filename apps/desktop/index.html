<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoxxyAI Workspaces</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <style>
      html, body { margin: 0; background: rgb(252, 252, 255); color: #0f172a;
        font-family: 'Inter', -apple-system, system-ui, sans-serif; }
      #splash-fallback { position: fixed; inset: 0; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 1.25rem; }
      /* Plain CSS ring spinner — no logo image (the brand mark read poorly
         scaled-up on the cold-start splash). Pink head on a soft track. */
      #splash-fallback .mark { width: 44px; height: 44px; border-radius: 50%;
        border: 3px solid rgba(236, 72, 153, 0.18); border-top-color: #ec4899;
        animation: splash-spin 0.8s linear infinite; }
      #splash-fallback .label { font-size: 0.85rem; color: #475569;
        letter-spacing: 0.04em; font-family: 'JetBrains Mono', monospace; }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
      /* Dark splash — main sets nativeTheme.themeSource from the persisted
         pref BEFORE the window is created, so this media query reflects the
         user's choice (not just the OS) by the time this CSS evaluates. The
         colors mirror styles.css's dark --color-main-bg / text tokens. */
      @media (prefers-color-scheme: dark) {
        html, body { background: #101117; color: #e8eaf6; }
        #splash-fallback .label { color: #a4abc8; }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash-fallback .mark { animation-duration: 1.6s; }
      }
    </style>
    <link rel="icon" type="image/png" href="/logo.png" />
    <div id="root">
      <div id="splash-fallback">
        <div class="mark" aria-label="moxxy"></div>
        <div class="label">Getting things ready…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
