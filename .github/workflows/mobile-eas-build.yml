name: Mobile EAS Build

# Build (and optionally submit) the Expo mobile app — apps/mobile —
# on EAS, using YOUR Expo account. All account identity stays in repo secrets so
# nothing is committed:
#
#   EXPO_TOKEN       - an Expo access token (Expo dashboard → Account → Access
#                      tokens). REQUIRED. This is the real secret.
#   EXPO_OWNER       - your Expo account/org username (the project owner).
#   EAS_PROJECT_ID   - the EAS project UUID (`eas project:info` / dashboard URL).
#
# app.config.ts reads EXPO_OWNER + EAS_PROJECT_ID from the env (below); the
# token is consumed by eas-cli via expo/expo-github-action.
#
# Trigger manually from the Actions tab; pick the platform, profile, and whether
# to submit to the stores after a successful build.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [all, ios, android]
        default: all
      profile:
        description: EAS build profile
        type: choice
        options: [preview, production, development]
        default: preview
      submit:
        description: Submit to the stores after build (production only)
        type: boolean
        default: false

concurrency:
  group: mobile-eas-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: EAS build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    env:
      # Injected into app.config.ts so the account identity is never committed.
      EXPO_OWNER: ${{ secrets.EXPO_OWNER }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      # Install the whole workspace (the mobile app pulls in @moxxy/client-core,
      # @moxxy/client-transport-ws, etc. as workspace deps).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Guard required secrets
        run: |
          if [ -z "${EXPO_OWNER}" ] || [ -z "${EAS_PROJECT_ID}" ]; then
            echo "::error::Set the EXPO_OWNER and EAS_PROJECT_ID repository secrets (and EXPO_TOKEN) before running this workflow."
            exit 1
          fi

      - name: EAS build
        run: eas build --non-interactive --no-wait --platform "${{ inputs.platform }}" --profile "${{ inputs.profile }}"

      - name: EAS submit
        if: ${{ inputs.submit && inputs.profile == 'production' }}
        run: eas submit --non-interactive --platform "${{ inputs.platform }}" --profile production --latest
