name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'AGENTS.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # configure-pages must run before upload-pages-artifact when the
      # repo's Pages source is set to "GitHub Actions" (the modern
      # default). Without it, the upload step 404s looking for a Pages
      # site that has not been initialised for the workflow.
      #
      # `enablement: true` makes the step *create* the Pages site if it
      # does not exist yet. Without that flag, configure-pages only
      # *reads* the existing site config and fails with
      # "Get Pages site failed ... Not Found" on a repository whose
      # Pages has never been turned on.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build docs
        run: pnpm --filter docs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
