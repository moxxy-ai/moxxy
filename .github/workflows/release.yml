name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-gateway:
    name: Gateway (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-14
          - platform: darwin-x86_64
            target: x86_64-apple-darwin
            runner: macos-15
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build gateway
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p moxxy-gateway
          else
            cargo build --release --target ${{ matrix.target }} -p moxxy-gateway
          fi

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/moxxy-gateway moxxy-gateway-${{ matrix.platform }}
          chmod +x moxxy-gateway-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: moxxy-gateway-${{ matrix.platform }}
          path: moxxy-gateway-${{ matrix.platform }}

  build-cli:
    name: CLI (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            bun-target: bun-darwin-arm64
            runner: macos-14
          - platform: darwin-x86_64
            bun-target: bun-darwin-x64
            runner: macos-15
          - platform: linux-arm64
            bun-target: bun-linux-arm64
            runner: ubuntu-latest
          - platform: linux-x86_64
            bun-target: bun-linux-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/moxxy-cli
        run: bun install

      - name: Build CLI binary
        working-directory: apps/moxxy-cli
        run: |
          bun build --compile --target=${{ matrix.bun-target }} --external react-devtools-core src/cli.js --outfile dist/moxxy
          cp dist/moxxy ../../moxxy-cli-${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: moxxy-cli-${{ matrix.platform }}
          path: moxxy-cli-${{ matrix.platform }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: apps/moxxy-cli
        run: npm install

      - name: Publish
        working-directory: apps/moxxy-cli
        run: npm publish --access public

  release:
    name: Create Release
    needs: [build-gateway, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          cd release
          sha256sum * > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
