name: Release

# On push to main this workflow has two modes:
#
#   1. There are pending changesets in `.changeset/`: open or update a
#      "Version Packages" PR that bumps versions + changelogs.
#   2. The Version Packages PR has just been merged: publish every
#      non-private workspace package whose version is not yet on npm.
#
# After either mode, a final step cuts the desktop release: when the merged
# Version Packages PR bumped @moxxy/desktop (a private, apps/ package that
# safe-publish.mjs never touches and never tags), it pushes the matching
# `desktop-v<version>` tag and dispatches release-desktop.yml. See that step
# for why it dispatches rather than relying on the tag-push trigger.
#
# The desktop also auto-proposes releases: when desktop-relevant code
# (apps/desktop or any packages/** — the desktop ships its renderer/main AND a
# bundled moxxy CLI that pulls in nearly every package) changes after its last
# release, the "Open desktop release PR" step opens (and keeps updating) a
# one-line `auto/desktop-release` PR that bumps the patch version. Merging that
# PR lands the bump on main, and the cut step above ships
# the release — so cutting a desktop release is a one-click merge, never a
# hand-edited version. It defers to explicit/changeset-driven bumps.
#
# Mode 2 runs through `scripts/safe-publish.mjs` rather than the default
# `changesets publish`. That wrapper:
#   - skips packages whose current version is already on the registry
#     (matches the behaviour of `changesets publish` for unchanged packages),
#   - auto-bumps past tombstoned versions until a free slot is found, and
#     commits those bumps back to main so the next release does not have
#     to walk them again,
#   - emits the `🦋  New tag: ...` markers `changesets/action` greps for so
#     GitHub releases continue to be created automatically.
#
# Required repo secret:
#   - NPM_TOKEN: npm automation token with publish rights for the @moxxy scope.
# GITHUB_TOKEN is provided automatically.
on:
  push:
    branches: [main]

# Serialise releases. We do not cancel in flight because cancelling a
# publish midway can leave one package on the registry and another not.
concurrency: release

permissions:
  contents: write
  pull-requests: write
  id-token: write
  # Lets the desktop-release step below dispatch release-desktop.yml
  # (workflow_dispatch == POST .../actions/workflows/.../dispatches).
  actions: write

jobs:
  release:
    name: Version / publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The safe-publish script may commit follow-up version bumps when
          # it walks past tombstoned npm slots. Fetch enough history that
          # the resulting `git push` is a fast-forward.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build so the prepack/postpack flow (strip @moxxy/* devDeps, bundle)
      # runs against a fresh dist before publish.
      - name: Build
        run: pnpm build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm dlx @changesets/cli@2.27.10 version
          publish: node scripts/safe-publish.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Cut the desktop release when the merged Version Packages PR bumped
      # @moxxy/desktop. The version on main is the source of truth: if there's
      # no `desktop-v<version>` tag yet, this bump hasn't been released. (On a
      # mode-1 run that only opens the Version PR, main still carries the old,
      # already-tagged version, so this is a cheap no-op.)
      #
      # Why dispatch instead of just pushing the tag: a tag pushed with the
      # default GITHUB_TOKEN does NOT start a new workflow run — GitHub's guard
      # against recursive runs means release-desktop.yml's `on: push: tags`
      # would never fire. workflow_dispatch (and repository_dispatch) are the
      # documented exceptions that DO fire under GITHUB_TOKEN. We still push
      # the tag first so dispatching `--ref desktop-v<version>` resolves, which
      # also makes release-desktop's `startsWith(github.ref, 'refs/tags/
      # desktop-v')` gate pass — so the GitHub Release publishes exactly as a
      # manual `git push origin desktop-v*` would.
      - name: Cut desktop release on version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./apps/desktop/package.json').version")"
          tag="desktop-v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null \
            || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "$tag already exists — desktop $version is already released."
            exit 0
          fi
          echo "Desktop bumped to $version with no $tag tag — releasing."
          git tag "$tag"
          git push origin "$tag"
          gh workflow run release-desktop.yml --ref "$tag"

      # Auto-OPEN A PR that bumps the desktop when its code changed since the
      # last release — so a release needs only a one-click merge, never a
      # hand-edited version. Runs AFTER the cut step so the cut step reads the
      # committed (released) version, not the bump we stage here.
      #
      # Acts only when the current version is already released (tag exists) and a
      # desktop-relevant path changed since that tag. Defers to in-flight bumps:
      # an untagged version (pending manual/changeset bump → the cut step ships
      # it) and a pending changeset already targeting @moxxy/desktop are both
      # skipped, so it never competes. Merging the opened PR lands the bump on
      # main, and the cut step above releases it on that run.
      - name: Stage desktop bump on source change
        id: deskbump
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/desktop/package.json').version")"
          tag="desktop-v$version"

          if ls .changeset/*.md >/dev/null 2>&1 && \
             grep -lE '"@moxxy/desktop"\s*:' .changeset/*.md >/dev/null 2>&1; then
            echo "A pending changeset targets @moxxy/desktop — letting changesets drive the bump."
            echo "bump=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if ! git fetch --quiet origin "refs/tags/$tag:refs/tags/$tag" 2>/dev/null; then
            echo "$version is not yet released ($tag missing) — pending; cut step will handle it."
            echo "bump=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # The desktop ships its own renderer/main AND a bundled moxxy CLI
          # (resources/moxxy-cli = @moxxy/cli + nearly every package: providers,
          # plugins, runner, sdk, modes). So any apps/desktop or packages/**
          # change can alter what the desktop installs — watch them all, not just
          # the UI packages (a fix in e.g. plugin-oauth must still cut a release).
          paths="apps/desktop packages"
          if git diff --quiet "$tag" HEAD -- $paths; then
            echo "No desktop changes since $tag — nothing to release."
            echo "bump=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          new="$(node -e "const v=require('./apps/desktop/package.json').version.split('.').map(Number); v[2]+=1; console.log(v.join('.'))")"
          echo "Desktop changed since $tag — staging bump $version → $new for a release PR."
          # Formatting-preserving: only the version string is rewritten.
          node -e "const fs=require('fs'),f='apps/desktop/package.json';let s=fs.readFileSync(f,'utf8');s=s.replace(/\"version\":\s*\"[^\"]+\"/, '\"version\": \"$new\"');fs.writeFileSync(f,s)"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "bump=true" >> "$GITHUB_OUTPUT"

      - name: Open desktop release PR
        if: steps.deskbump.outputs.bump == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/desktop-release
          base: main
          add-paths: apps/desktop/package.json
          commit-message: "chore(desktop): release v${{ steps.deskbump.outputs.new }}"
          title: "chore(desktop): release v${{ steps.deskbump.outputs.new }}"
          body: |
            Automated desktop release bump — desktop-relevant code changed since
            the last release (`apps/desktop` + desktop-host / desktop-ipc-contract
            / desktop-ui / chat-model).

            Merging this bumps `@moxxy/desktop` to
            **${{ steps.deskbump.outputs.new }}**; the release workflow then tags
            `desktop-v${{ steps.deskbump.outputs.new }}` and builds + publishes the
            installers (and the self-update bundle).

            This PR auto-updates as more desktop changes land — just merge when
            you want to cut the release.
          delete-branch: true
