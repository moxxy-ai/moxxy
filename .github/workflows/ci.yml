name: CI

# Branch model: `development` is the integration branch — every feature PR
# targets it and must be green here. `main` is the production branch, updated
# ONLY by a `development → main` release PR.
#
# Triggers are deliberately NON-overlapping to avoid double runs: `pull_request`
# covers every PR (feature → development AND release development → main), and
# `push` covers ONLY `main` (post-release validation of the merged result).
# `development` is intentionally NOT in `push` — it would double every commit
# (one push run + one pull_request run from the open dev→main PR), and direct
# pushes to development are `[skip ci]` bot commits (prepare-release, sync-back).
# The changeset gate applies only to feature PRs (→ development); a dev→main
# release PR carries no NEW changeset.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Every PR must add a changeset — it is the switch that drives version bumps,
  # the npm publish (@moxxy/cli + @moxxy/sdk), AND the desktop installer release
  # (@moxxy/desktop rides changesets too). A PR without one ships nothing. For a
  # change that genuinely releases nothing (docs / CI / tests), record that on
  # purpose with an EMPTY changeset: `pnpm changeset --empty`.
  changeset:
    name: Changeset present
    runs-on: ubuntu-latest
    # Only PRs have a base branch to diff against, and only FEATURE PRs (those
    # targeting `development`) must add one. A `development → main` release PR
    # carries the already-merged changesets, not new ones, so it's exempt — as
    # is the push-to-branch merge result.
    if: github.event_name == 'pull_request' && github.base_ref == 'development'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history back to the merge-base so the diff below resolves.
          fetch-depth: 0
      - name: Require a changeset
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Real changeset markdown added/modified in this PR (exclude the
          # template README and the non-markdown config). `|| true` so a
          # no-match grep under `set -eo pipefail` doesn't abort before the
          # friendly error below.
          added="$( { git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD -- '.changeset/' \
            | grep -E '\.md$' | grep -vE '(^|/)README\.md$'; } || true )"
          if [ -z "$added" ]; then
            echo "::error::No changeset in this PR. Run 'pnpm changeset' (or 'pnpm changeset --empty' for a no-release change) and commit the file under .changeset/."
            exit 1
          fi
          echo "Changeset(s) found in this PR:"
          printf '%s\n' "$added"

  build-and-test:
    name: Build + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the declared engines floor (>=20.10), current LTS, and latest.
        node: ['20.x', '22.x', '24.x']
    env:
      MOXXY_FIXTURES: replay

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Restore Turborepo's local cache so unchanged packages aren't rebuilt
      # or retested across runs. The cache is content-addressed, so restoring a
      # superset is always safe — turbo only reuses entries whose hash matches.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-

      # Use the root scripts (turbo run …) rather than `pnpm -r` so CI gets
      # turbo's graph-aware ordering AND caching — the whole repo is built
      # around it; `pnpm -r` ignored the cache entirely.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # Cap turbo's package-level parallelism on the 4-vCPU runner: each
        # package's vitest already spawns per-core workers, so the default
        # fan-out oversubscribes CPU and makes timing-sensitive perf guards
        # (e.g. anonymizer's O(n²)-redaction regression test) flake. Two packages
        # at a time keeps total workers near core count without hiding regressions.
        run: pnpm exec turbo run test --concurrency=2 && pnpm run test:scripts

      - name: Dependency invariants
        run: pnpm check:deps

      - name: Smoke — CLI help loads
        run: node packages/cli/dist/bin.js --help

      - name: Smoke — plugins list (no API calls)
        run: node packages/cli/dist/bin.js plugins list

  dep-cruise-graph:
    name: Generate dependency graph
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Render graph
        run: |
          mkdir -p .artifacts
          pnpm exec depcruise --config .dependency-cruiser.cjs --output-type dot packages \
            > .artifacts/graph.dot || true

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: .artifacts/graph.dot
          if-no-files-found: ignore
